<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Record</title>

<style>
  body {
    margin: 0;
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #222;
  }

  .container {
    max-width: 420px;
    margin: 0 auto;
    padding: 16px;
  }

  .header {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 18px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.04);
  }

  .profile {
    display: flex;
    align-items: center;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 700;
    margin-right: 12px;
  }

  .title {
    font-size: 16px;
    font-weight: 600;
  }

  .date {
    font-size: 12px;
    color: #999;
    margin-top: 2px;
  }

  .profit {
    margin-top: 16px;
    font-size: 20px;
    font-weight: 700;
  }

  .memo {
    margin-top: 10px;
    font-size: 14px;
    color: #555;
    line-height: 1.5;
  }

</style>
</head>

<body>

<div class="container">

  <!-- 상단 페이지 제목 (여기 수정) -->
  <div class="header">홈</div>

  <div class="card">

    <div class="profile">

      <!-- [1] 프로필 설정: 티커명과 배경색 수정 -->
      <!-- background 값 변경 / 텍스트 변경 -->
      <div class="avatar" style="background:#2979ff;">QLD</div>

      <div>
        <!-- [2] 게시물 제목 수정 -->
        <div class="title">QLD</div>

        <!-- [3] 매매 날짜 수정 -->
        <div class="date">2026년 04월18일</div>
      </div>

    </div>

    <!-- [4] 수익 금액 및 수익률 수정 (색상도 여기서 변경 가능) -->
    <div class="profit" style="color:#e53935;">
    $167.72 (14.8%)
    </div>

    <!-- [5] 추가 메모 작성 -->
    <div class="memo">
    나스닥 전고점 진입 및 수익실현 욕구로 매도
    </div>

  </div>

</div>

</body>
</html>
