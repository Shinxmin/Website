<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- 화면 영역 -->
  <div class="screen active" id="screenA">
    <h1>홈</h1>
  </div>

  <div class="screen" id="screenB">
    <h1>B 화면</h1>
  </div>

  <div class="screen" id="screenC">
    <h1>C 화면</h1>
  </div>

  <!-- 하단 네비게이션 -->
  <div class="nav">
    <div class="indicator"></div>
    <div class="tab active" onclick="changeTab('A')">A</div>
    <div class="tab" onclick="changeTab('B')">B</div>
    <div class="tab" onclick="changeTab('C')">C</div>
  </div>

  <script src="script.js"></script>



  
</body>
</html>
