<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기록</title>
</head>

<body style="margin:0; font-family:-apple-system, BlinkMacSystemFont, sans-serif; background:#fff;">

<div style="max-width:420px; margin:0 auto; padding:16px;">

  <!-- 제목 -->
  <div style="font-size:30px; font-weight:800; margin-bottom:12px;">기록</div>

  <!-- 달러 + 작성 -->
  <div style="display:flex; gap:8px; margin-bottom:16px;">

    <!-- 왼쪽: 달러 카드 -->
    <div style="
        flex:1;
        padding:14px;
        border-radius:16px;
        background:#f7f8fa;
        box-sizing:border-box;
    ">

      <div style="font-size:12px; color:#888;">달러</div>

      <div id="totalDollarText" style="font-size:18px; font-weight:700; margin-top:4px;">
        $ 0
      </div>

      <div id="profitDollarText" style="font-size:13px; color:#22c55e; margin-top:4px;">
        (+ $0)
      </div>

      <div onclick="openSetting()" style="
          margin-top:10px;
          font-size:12px;
          color:#3182f6;
          cursor:pointer;
      ">
        설정
      </div>

    </div>

    <!-- 오른쪽: 작성 버튼 -->
    <div onclick="openModal()" style="
        width:90px;
        border-radius:16px;
        background:#3182f6;
        color:#fff;
        display:flex;
        align-items:center;
        justify-content:center;
        font-weight:600;
        cursor:pointer;
    ">
      작성
    </div>

  </div>

  <!-- 게시물 리스트 -->
  <div id="postList"></div>

</div>

<!-- 설정 모달 -->
<div id="settingModal" style="
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
">

  <div style="
    width:300px;
    background:#fff;
    margin:20% auto;
    padding:16px;
    border-radius:12px;
  ">

    <div style="margin-bottom:8px;">보유 달러</div>

    <input id="inputDollar" type="number" style="
      width:100%;
      padding:10px;
      border:1px solid #ddd;
      border-radius:8px;
      box-sizing:border-box;
    ">

    <button onclick="saveDollar()" style="
      margin-top:10px;
      width:100%;
      padding:10px;
      background:#3182f6;
      color:#fff;
      border:none;
      border-radius:8px;
    ">
      저장
    </button>

  </div>
</div>

<!-- 입력 모달 -->
<div id="modal" style="
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-radius:20px 20px 0 0;
  padding:20px;
  display:none;
  max-height:80vh;
  overflow:auto;
  box-shadow:0 -4px 20px rgba(0,0,0,0.1);
  box-sizing:border-box;
">

  <input id="ticker" placeholder="티커" style="width:100%; padding:10px; margin-bottom:10px;">
  <input id="postTitle" placeholder="제목" style="width:100%; padding:10px; margin-bottom:10px;">
  <input id="color" value="#3182f6" style="width:100%; padding:10px; margin-bottom:10px;">
  <input id="date" type="date" style="width:100%; padding:10px; margin-bottom:10px;">
  <input id="buy" type="number" placeholder="구매 가격" style="width:100%; padding:10px; margin-bottom:10px;">
  <input id="sell" type="number" placeholder="판매 가격" style="width:100%; padding:10px; margin-bottom:10px;">
  <input id="qty" type="number" placeholder="수량(표시용)" style="width:100%; padding:10px; margin-bottom:10px;">
  <input id="memo" placeholder="메모" style="width:100%; padding:10px; margin-bottom:10px;">

  <div onclick="addPost()" style="
    padding:14px;
    background:#3182f6;
    color:#fff;
    border-radius:14px;
    text-align:center;
    font-weight:600;
    cursor:pointer;
  ">
    저장
  </div>

</div>

<script>
  const modal = document.getElementById("modal");
  const postList = document.getElementById("postList");
  const settingModal = document.getElementById("settingModal");

  let posts = JSON.parse(localStorage.getItem("posts")) || [];

  let totalDollar = Number(localStorage.getItem("totalDollar")) || 0;
  let profitDollar = Number(localStorage.getItem("profitDollar")) || 0;

  function openModal() {
    modal.style.display = "block";
  }

  function openSetting() {
    document.getElementById("inputDollar").value = totalDollar;
    settingModal.style.display = "block";
  }

  function saveDollar() {
    totalDollar = Number(document.getElementById("inputDollar").value) || 0;
    localStorage.setItem("totalDollar", totalDollar);
    settingModal.style.display = "none";
    renderDollar();
  }

  function savePosts() {
    localStorage.setItem("posts", JSON.stringify(posts));
  }

  function renderDollar() {
    document.getElementById("totalDollarText").innerText =
      `$ ${totalDollar.toLocaleString()}`;

    document.getElementById("profitDollarText").innerText =
      `(+ $${profitDollar.toLocaleString()})`;
  }

  function deletePost(index) {
    posts.splice(index, 1);
    savePosts();
    renderPosts();
  }

  function renderPosts() {
    postList.innerHTML = "";

    posts.forEach((p, index) => {

      const card = document.createElement("div");
      card.style = "position:relative; background:#fff; border-radius:20px; padding:18px; box-shadow:0 6px 18px rgba(0,0,0,0.04); margin-bottom:14px;";

      const del = document.createElement("div");
      del.innerText = "삭제";
      del.style = "position:absolute; top:16px; right:16px; font-size:12px; color:#aaa; cursor:pointer;";
      del.onclick = () => deletePost(index);

      const content = document.createElement("div");

      content.innerHTML = `
        <div style="display:flex; align-items:center;">
          <div style="
            width:44px;
            height:44px;
            border-radius:50%;
            background:${p.color};
            display:flex;
            align-items:center;
            justify-content:center;
            color:#fff;
            font-weight:700;
            margin-right:12px;
          ">
            ${p.ticker}
          </div>

          <div>
            <div style="font-weight:600;">${p.title}</div>
            <div style="font-size:12px; color:#999;">${p.date}</div>
          </div>
        </div>

        <div style="margin-top:14px; font-size:20px; font-weight:700; color:${p.profit >= 0 ? '#e53935' : '#2979ff'};">
          $${p.profit.toFixed(2)} (${p.percent.toFixed(1)}%)
        </div>

        <div style="margin-top:4px; font-size:12px; color:#999;">
          ${p.qty}주
        </div>

        <div style="margin-top:8px; font-size:14px; color:#555;">
          ${p.memo}
        </div>
      `;

      card.appendChild(del);
      card.appendChild(content);
      postList.appendChild(card);
    });
  }

  function addPost() {

    const ticker = document.getElementById("ticker").value;
    const title = document.getElementById("postTitle").value;
    const color = document.getElementById("color").value;

    const rawDate = document.getElementById("date").value;
    const date = rawDate ? rawDate.replaceAll("-", ".") : "날짜 없음";

    const buy = parseFloat(document.getElementById("buy").value);
    const sell = parseFloat(document.getElementById("sell").value);
    const qty = parseFloat(document.getElementById("qty").value);
    const memo = document.getElementById("memo").value;

    if (isNaN(buy) || isNaN(sell)) return;

    const profit = sell - buy;
    const percent = buy !== 0 ? (profit / buy) * 100 : 0;

    // 누적 수익 반영
    profitDollar += profit;
    localStorage.setItem("profitDollar", profitDollar);

    posts.unshift({
      ticker,
      title,
      color,
      date,
      profit,
      percent,
      memo,
      qty
    });

    savePosts();
    renderPosts();
    renderDollar();

    modal.style.display = "none";

    document.querySelectorAll("input").forEach(i => {
      if (i.id === "color") i.value = "#3182f6";
      else i.value = "";
    });
  }

  renderPosts();
  renderDollar();

</script>

</body>
</html>
