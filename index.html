<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대시보드</title>

<style>
@keyframes cardIn {
  from { opacity:0; transform:translateY(8px); }
  to { opacity:1; transform:translateY(0); }
}

.card {
  position: relative;
  background: #fff;
  border-radius: 20px;
  padding: 18px;
  margin-bottom: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.04);
  animation: cardIn 0.25s ease;
  transition: all 0.2s ease;
}

.card-profit {
  box-shadow:
    0 0 0 1px rgba(229,57,53,0.35),
    0 0 14px rgba(229,57,53,0.25),
    0 6px 18px rgba(0,0,0,0.04);
}

.card:hover {
  transform: translateY(-2px);
}

.del-btn {
  position:absolute;
  top:16px;
  right:16px;
  font-size:12px;
  color:#aaa;
  cursor:pointer;
  transition:0.2s;
}
.del-btn:hover {
  color:#333;
}
</style>

</head>

<body style="margin:0; font-family:-apple-system, BlinkMacSystemFont, sans-serif; background:#fff;">

<div style="max-width:420px; margin:0 auto; padding:16px;">

  <div style="font-size:30px; font-weight:800; margin-bottom:12px;">대시보드</div>

  <div style="display:flex; gap:8px; margin-bottom:16px;">

    <div style="flex:1; padding:14px; border-radius:16px; background:#f7f8fa;">
      <div style="font-size:12px; color:#888;">누적 수익</div>
      <div id="totalProfitText" style="font-size:18px; font-weight:700; margin-top:6px;">
        $ 0.00
      </div>
    </div>

    <div onclick="openModal()" style="
      width:90px;
      border-radius:16px;
      background:#3182f6;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:600;
      cursor:pointer;
    ">
      작성
    </div>

  </div>

  <div id="postList"></div>

</div>

<!-- 모달 -->
<div id="modal" style="
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-radius:20px 20px 0 0;
  padding:20px;
  display:none;
  max-height:80vh;
  overflow:auto;
  box-shadow:0 -4px 20px rgba(0,0,0,0.1);
">

  <input id="ticker" placeholder="티커" style="width:100%; padding:10px; margin-bottom:10px;">
  <input id="postTitle" placeholder="제목" style="width:100%; padding:10px; margin-bottom:10px;">
  <input id="color" value="#000000" style="width:100%; padding:10px; margin-bottom:10px;">
  <input id="date" type="date" style="width:100%; padding:10px; margin-bottom:10px;">
  <input id="buy" type="number" placeholder="구매 가격" style="width:100%; padding:10px; margin-bottom:10px;">
  <input id="sell" type="number" placeholder="판매 가격" style="width:100%; padding:10px; margin-bottom:10px;">
  <input id="qty" type="number" placeholder="수량" style="width:100%; padding:10px; margin-bottom:10px;">
  <input id="memo" placeholder="메모" style="width:100%; padding:10px; margin-bottom:10px;">

  <div onclick="addPost()" style="padding:14px; background:#3182f6; color:#fff; border-radius:14px; text-align:center; font-weight:600;">
    저장
  </div>

</div>

<script>

const modal = document.getElementById("modal");
const postList = document.getElementById("postList");
const totalEl = document.getElementById("totalProfitText");

let posts = JSON.parse(localStorage.getItem("posts")) || [];

/* 모달 */
function openModal() {
  modal.style.display = "block";
}

/* 저장 */
function savePosts() {
  localStorage.setItem("posts", JSON.stringify(posts));
}

/* 삭제 */
function deletePost(index) {
  posts.splice(index, 1);
  savePosts();
  renderPosts();
}

/* ✔ 카운트업 핵심 */
function animateNumber(from, to, duration = 500) {
  const start = performance.now();

  function frame(now) {
    const progress = Math.min((now - start) / duration, 1);
    const value = from + (to - from) * progress;

    totalEl.innerText = `$ ${value.toFixed(2)}`;

    if (progress < 1) {
      requestAnimationFrame(frame);
    }
  }

  requestAnimationFrame(frame);
}

/* 누적 수익 */
let lastTotal = 0;

function renderTotalProfit() {
  const total = posts.reduce((sum, p) => sum + (p.profit || 0), 0);

  animateNumber(lastTotal, total);
  lastTotal = total;
}

/* 리스트 */
function renderPosts() {

  postList.innerHTML = "";

  posts.forEach((p, index) => {

    const card = document.createElement("div");
    card.className = "card";

    if (p.profit > 0) card.classList.add("card-profit");

    const del = document.createElement("div");
    del.innerText = "삭제";
    del.className = "del-btn";
    del.onclick = () => deletePost(index);

    const content = document.createElement("div");

    content.innerHTML = `
      <div style="display:flex; align-items:center;">
        <div style="
          width:44px;
          height:44px;
          border-radius:50%;
          background:${p.color};
          display:flex;
          align-items:center;
          justify-content:center;
          color:#fff;
          font-weight:700;
          margin-right:12px;
        ">
          ${p.ticker}
        </div>

        <div>
          <div style="font-weight:600;">${p.title}</div>
          <div style="font-size:12px; color:#999;">${p.date}</div>
        </div>
      </div>

      <div style="margin-top:14px; font-size:20px; font-weight:700; color:${p.profit >= 0 ? '#e53935' : '#2979ff'};">
        $${p.profit.toFixed(2)} (${p.percent.toFixed(1)}%)
      </div>

      <div style="margin-top:4px; font-size:12px; color:#999;">
        ${p.qty}주
      </div>

      <div style="margin-top:8px; font-size:14px; color:#555;">
        ${p.memo}
      </div>
    `;

    card.appendChild(del);
    card.appendChild(content);
    postList.appendChild(card);
  });

  renderTotalProfit();
}

/* 추가 */
function addPost() {

  const ticker = document.getElementById("ticker").value;
  const title = document.getElementById("postTitle").value;
  const color = document.getElementById("color").value || "#000000";

  const rawDate = document.getElementById("date").value;
  const date = rawDate ? rawDate.replaceAll("-", ".") : "날짜 없음";

  const buy = parseFloat(document.getElementById("buy").value);
  const sell = parseFloat(document.getElementById("sell").value);
  const qty = parseFloat(document.getElementById("qty").value);
  const memo = document.getElementById("memo").value;

  if (isNaN(buy) || isNaN(sell)) return;

  const profit = sell - buy;
  const percent = buy !== 0 ? (profit / buy) * 100 : 0;

  posts.unshift({
    ticker,
    title,
    color,
    date,
    profit,
    percent,
    memo,
    qty
  });

  savePosts();
  renderPosts();

  modal.style.display = "none";

  document.querySelectorAll("input").forEach(i => i.value = "");
}

renderPosts();

</script>

</body>
</html>
