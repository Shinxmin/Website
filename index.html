<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기록</title>

<style>
@keyframes cardIn {
  from { opacity:0; transform:translateY(8px); }
  to { opacity:1; transform:translateY(0); }
}

body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#fff;
}

/* 카드 */
.card {
  position: relative;
  background: #fff;
  border-radius: 20px;
  padding: 18px;
  margin-bottom: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.04);
  animation: cardIn 0.25s ease;
  transition: transform 0.12s ease, box-shadow 0.12s ease;
  -webkit-tap-highlight-color: transparent;
}

.card:active {
  transform: scale(0.98);
}

.card-profit {
  box-shadow:
    0 0 0 1px rgba(229,57,53,0.35),
    0 0 14px rgba(229,57,53,0.25),
    0 6px 18px rgba(0,0,0,0.04);
}

.del-btn {
  position:absolute;
  top:16px;
  right:16px;
  font-size:12px;
  color:#aaa;
  cursor:pointer;
  transition:0.12s;
  -webkit-tap-highlight-color: transparent;
}

.del-btn:active {
  transform: scale(0.92);
  color:#333;
}

.modal-input {
  width:100%;
  box-sizing:border-box;
  padding:10px;
  margin-bottom:10px;
  border-radius:12px;
  border:1px solid #eee;
  outline:none;
  font-size:14px;
}

button, div[onclick] {
  -webkit-tap-highlight-color: transparent;
}

/* ✔ 추가: 탭바 */
.tabbar {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  background:#fff;
  border-top:1px solid #eee;
  display:flex;
}

.tab {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  color:#999;
}

.tab.active {
  color:#3182f6;
  font-weight:700;
}

/* 하단 여백 확보 */
.wrapper {
  padding-bottom:80px;
}
</style>

</head>

<body>

<div class="wrapper">

<!-- ✔ 기록 화면 -->
<div id="recordView">

<div style="max-width:420px; margin:0 auto; padding:16px;">

  <div style="font-size:30px; font-weight:800; margin-bottom:12px;">기록</div>

  <div style="display:flex; gap:8px; margin-bottom:16px;">

    <div style="flex:1; padding:14px; border-radius:16px; background:#f7f8fa;">
      <div style="font-size:12px; color:#888;">누적 수익</div>
      <div id="totalProfitText" style="font-size:18px; font-weight:700; margin-top:6px;">
        $ 0.00
      </div>
    </div>

    <div onclick="openModal()" style="
      width:90px;
      border-radius:16px;
      background:#3182f6;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:600;
      cursor:pointer;
      transition:0.12s;
    "
    onmousedown="this.style.transform='scale(0.95)'"
    onmouseup="this.style.transform='scale(1)'"
    ontouchstart="this.style.transform='scale(0.95)'"
    ontouchend="this.style.transform='scale(1)'"
    >
      작성
    </div>

  </div>

  <div id="postList"></div>

</div>
</div>

<!-- ✔ 커뮤니티 (UI만) -->
<div id="communityView" style="display:none;">
  <div style="max-width:420px; margin:0 auto; padding:16px;">
    <div style="font-size:30px; font-weight:800;">커뮤니티</div>
  </div>
</div>

</div>

<!-- 모달 (그대로 유지) -->
<div id="modal" style="
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-radius:20px 20px 0 0;
  padding:20px;
  display:none;
  max-height:80vh;
  overflow:auto;
  box-shadow:0 -4px 20px rgba(0,0,0,0.1);
">

  <!-- (기존 내용 그대로 유지) -->
  <input id="ticker" placeholder="티커" class="modal-input">
  <input id="postTitle" placeholder="제목" class="modal-input">
  <input id="color" placeholder="색상" class="modal-input">
  <input id="date" type="date" class="modal-input">
  <input id="buy" type="number" placeholder="구매 가격" class="modal-input">
  <input id="sell" type="number" placeholder="판매 가격" class="modal-input">
  <input id="qty" type="number" placeholder="수량" class="modal-input">
  <input id="memo" placeholder="메모" class="modal-input">

  <div onclick="addPost()" class="btn">저장</div>
  <div onclick="closeModal()" class="btn" style="background:#eee; color:#555; margin-top:8px;">취소</div>

</div>

<!-- ✔ 하단 탭 -->
<div class="tabbar">
  <div class="tab active" onclick="switchTab('record')" id="tab_record">기록</div>
  <div class="tab" onclick="switchTab('community')" id="tab_community">커뮤니티</div>
</div>

<script>

/* ✔ 기존 코드 그대로 유지 */
const modal = document.getElementById("modal");
const postList = document.getElementById("postList");
const totalEl = document.getElementById("totalProfitText");

let posts = JSON.parse(localStorage.getItem("posts")) || [];

function openModal() {
  modal.style.display = "block";
}

function closeModal() {
  modal.style.display = "none";
}

/* ✔ 추가: 탭 전환 */
function switchTab(tab) {

  document.getElementById("recordView").style.display = tab === "record" ? "block" : "none";
  document.getElementById("communityView").style.display = tab === "community" ? "block" : "none";

  document.getElementById("tab_record").classList.toggle("active", tab==="record");
  document.getElementById("tab_community").classList.toggle("active", tab==="community");

  closeModal();
}

/* 이하 기존 로직 그대로 */
function savePosts() {
  localStorage.setItem("posts", JSON.stringify(posts));
}

function deletePost(index) {
  posts.splice(index, 1);
  savePosts();
  renderPosts();
}

function animateNumber(from, to, duration = 500) {
  const start = performance.now();
  function frame(now) {
    const progress = Math.min((now - start) / duration, 1);
    const value = from + (to - from) * progress;
    totalEl.innerText = `$ ${value.toFixed(2)}`;
    if (progress < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

let lastTotal = 0;

function renderTotalProfit() {
  const total = posts.reduce((sum, p) => sum + (p.profit || 0), 0);
  animateNumber(lastTotal, total);
  lastTotal = total;
}

function renderPosts() {

  postList.innerHTML = "";

  posts.forEach((p, index) => {

    const card = document.createElement("div");
    card.className = "card";

    if (p.profit > 0) card.classList.add("card-profit");

    const del = document.createElement("div");
    del.innerText = "삭제";
    del.className = "del-btn";
    del.onclick = () => deletePost(index);

    const content = document.createElement("div");

    content.innerHTML = `
      <div style="display:flex; align-items:center;">
        <div style="width:44px;height:44px;border-radius:50%;background:${p.color};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;margin-right:12px;">
          ${p.ticker}
        </div>
        <div>
          <div style="font-weight:600;">${p.title}</div>
          <div style="font-size:12px; color:#999;">${p.date}</div>
        </div>
      </div>
      <div style="margin-top:14px; font-size:20px; font-weight:700; color:${p.profit >= 0 ? '#e53935' : '#2979ff'};">
        $${p.profit.toFixed(2)} (${p.percent.toFixed(1)}%)
      </div>
      <div style="margin-top:4px; font-size:12px; color:#999;">
        ${p.qty}주
      </div>
      <div style="margin-top:8px; font-size:14px; color:#555;">
        ${p.memo}
      </div>
    `;

    card.appendChild(del);
    card.appendChild(content);
    postList.appendChild(card);
  });

  renderTotalProfit();
}

function addPost() {

  const ticker = document.getElementById("ticker").value;
  const title = document.getElementById("postTitle").value;
  const color = document.getElementById("color").value || "#000000";

  const rawDate = document.getElementById("date").value;
  const date = rawDate ? rawDate.replaceAll("-", ".") : "날짜 없음";

  const buy = parseFloat(document.getElementById("buy").value);
  const sell = parseFloat(document.getElementById("sell").value);
  const qty = parseFloat(document.getElementById("qty").value);
  const memo = document.getElementById("memo").value;

  if (isNaN(buy) || isNaN(sell)) return;

  const profit = sell - buy;
  const percent = buy !== 0 ? (profit / buy) * 100 : 0;

  posts.unshift({
    ticker,
    title,
    color,
    date,
    profit,
    percent,
    memo,
    qty
  });

  savePosts();
  renderPosts();

  modal.style.display = "none";
  document.querySelectorAll("input").forEach(i => i.value = "");
}

renderPosts();

</script>

</body>
</html>
