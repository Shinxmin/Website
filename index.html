<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기록</title>

<style>
  body {
    margin: 0;
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .container {
    max-width: 420px;
    margin: 0 auto;
    padding: 16px;
  }

  /* 상단 제목 */
  .header {
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 12px;
  }

  /* 작성 버튼 */
  .write-btn {
    width: 100%;
    padding: 14px;
    border-radius: 16px;
    background: #3182f6;
    color: #fff;
    text-align: center;
    font-weight: 600;
    margin-bottom: 16px;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 18px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.04);
    margin-bottom: 14px;
  }

  .profile {
    display: flex;
    align-items: center;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 700;
    margin-right: 12px;
  }

  .title {
    font-weight: 600;
  }

  .date {
    font-size: 12px;
    color: #999;
  }

  .profit {
    margin-top: 14px;
    font-size: 20px;
    font-weight: 700;
  }

  .memo {
    margin-top: 8px;
    font-size: 14px;
    color: #555;
  }

  /* 모달 */
  .modal {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    display: none;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
    max-height: 80vh;
    overflow-y: auto;
  }

  input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 12px;
    border: 1px solid #eee;
  }

  .save-btn {
    padding: 14px;
    background: #3182f6;
    color: #fff;
    border-radius: 14px;
    text-align: center;
    font-weight: 600;
  }

</style>
</head>

<body>

<div class="container">

  <!-- [상단 제목] -->
  <div class="header">기록</div>

  <!-- [작성 버튼] -->
  <div class="write-btn" onclick="openModal()">작성</div>

  <!-- 게시물 리스트 -->
  <div id="postList"></div>

</div>

<!-- 입력 모달 -->
<div class="modal" id="modal">

  <!-- [1] 티커 -->
  <input id="ticker" placeholder="티커">

  <!-- [2] 게시글 제목 -->
  <input id="postTitle" placeholder="게시글 제목">

  <!-- [3] 프로필 색상 (hex 입력) -->
  <input id="color" placeholder="프로필 색상 (예: #2979ff)">

  <!-- [4] 매매 일시 -->
  <input id="date" type="datetime-local">

  <!-- [5] 매수 금액 -->
  <input id="buy" type="number" placeholder="매수 금액">

  <!-- [6] 매도 금액 -->
  <input id="sell" type="number" placeholder="매도 금액">

  <!-- [7] 수량 -->
  <input id="qty" type="number" placeholder="수량">

  <!-- [8] 수수료 -->
  <input id="fee" type="number" placeholder="수수료">

  <!-- [9] 메모 -->
  <input id="memo" placeholder="메모">

  <!-- [10] 저장 버튼 -->
  <div class="save-btn" onclick="addPost()">저장</div>

</div>

<script>
  const modal = document.getElementById("modal");
  const postList = document.getElementById("postList");

  let posts = JSON.parse(localStorage.getItem("posts")) || [];

  function openModal() {
    modal.style.display = "block";
  }

  function savePosts() {
    localStorage.setItem("posts", JSON.stringify(posts));
  }

  function renderPosts() {
    postList.innerHTML = "";

    posts.forEach(p => {
      const card = document.createElement("div");
      card.className = "card";

      const color = p.profit >= 0 ? "#e53935" : "#2979ff";

      card.innerHTML = `
        <div class="profile">
          <div class="avatar" style="background:${p.color}">${p.ticker}</div>
          <div>
            <div class="title">${p.title}</div>
            <div class="date">${p.date}</div>
          </div>
        </div>

        <div class="profit" style="color:${color}">
          ${p.profit >= 0 ? "+" : ""}$${p.profit.toFixed(2)} (${p.percent.toFixed(1)}%)
        </div>

        <div class="memo">${p.memo}</div>
      `;

      postList.appendChild(card);
    });
  }

  function addPost() {

    const ticker = document.getElementById("ticker").value;
    const title = document.getElementById("postTitle").value;
    const color = document.getElementById("color").value || "#2979ff";
    const date = document.getElementById("date").value;
    const buy = parseFloat(document.getElementById("buy").value);
    const sell = parseFloat(document.getElementById("sell").value);
    const qty = parseFloat(document.getElementById("qty").value);
    const fee = parseFloat(document.getElementById("fee").value) || 0;
    const memo = document.getElementById("memo").value;

    if (!ticker || !buy || !sell || !qty) return;

    /* 핵심 계산 */
    const totalBuy = buy * qty;
    const totalSell = sell * qty;
    const profit = totalSell - totalBuy - fee;
    const percent = (profit / totalBuy) * 100;

    const newPost = {
      ticker,
      title,
      color,
      date,
      profit,
      percent,
      memo
    };

    posts.unshift(newPost);

    savePosts();
    renderPosts();

    modal.style.display = "none";
    document.querySelectorAll("input").forEach(i => i.value = "");
  }

  renderPosts();
</script>

</body>
</html>
