<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Post</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #222;
  }

  .container {
    max-width: 420px;
    margin: 0 auto;
    padding: 16px;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 18px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.04);
  }

  /* 프로필 */
  .profile {
    display: flex;
    align-items: center;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #2979ff;
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 12px;
  }

  .name {
    font-weight: 600;
    font-size: 15px;
  }

  .sub {
    font-size: 12px;
    color: #888;
  }

  /* 수익 강조 */
  .profit {
    margin-top: 18px;
    font-size: 22px;
    font-weight: 700;
    color: #e53935;
  }

  /* 설명 */
  .content {
    margin-top: 10px;
    font-size: 14px;
    color: #555;
    line-height: 1.5;
  }

  /* 버튼 */
  .actions {
    display: flex;
    margin-top: 18px;
  }

  .btn {
    flex: 1;
    padding: 12px 0;
    text-align: center;
    border-radius: 12px;
    background: #f4f6f8;
    margin-right: 8px;
    font-size: 14px;
    color: #555;
  }

  .btn:last-child {
    margin-right: 0;
  }

</style>
</head>

<body>

<div class="container">

  <div class="card">
    
    <div class="profile">
      <div class="avatar">QLD</div>
      <div>
        <div class="name">QLD 투자 기록</div>
        <div class="sub">방금 전 · 수익 실현</div>
      </div>
    </div>

    <div class="profit">
      + $167.72 (14.8%)
    </div>

    <div class="content">
      목표 수익률 도달로 일부 물량을 정리했다. 계획대로 진행된 트레이드.
    </div>

    <div class="actions">
      <div class="btn">좋아요</div>
      <div class="btn">댓글</div>
      <div class="btn">공유</div>
    </div>

  </div>

</div>

</body>
</html>
