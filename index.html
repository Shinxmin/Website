<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자산관리</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h2>자산 입력</h2>

    <div class="form">
      <input type="number" id="income" placeholder="입출금">
      <input type="number" id="saving" placeholder="예/적금">
      <input type="number" id="invest" placeholder="투자">
      <input type="number" id="cash" placeholder="현금">

      <button onclick="saveData()">저장</button>
    </div>

    <!-- 원그래프 -->
    <div class="pie" id="pie">
      <div class="center">
        <div class="total" id="total">₩0</div>
        <div class="label">총 자산</div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
