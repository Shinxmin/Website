<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기록</title>
</head>

<body style="margin:0; font-family:-apple-system, BlinkMacSystemFont, sans-serif; background:#fff;">

<div style="max-width:420px; margin:0 auto; padding:16px;">

  <div style="font-size:30px; font-weight:800; margin-bottom:10px;">기록</div>

  <!-- 지수 -->
  <div id="indexBar" style="font-size:13px; color:#555; margin-bottom:14px;">
    불러오는 중...
  </div>

  <div onclick="openModal()" style="
    width:100%;
    padding:14px;
    border-radius:16px;
    background:#3182f6;
    color:#fff;
    text-align:center;
    font-weight:600;
    margin-bottom:16px;
    cursor:pointer;
  ">
    작성
  </div>

  <div id="postList"></div>

</div>

<script>
const indexBar = document.getElementById("indexBar");

async function fetchIndices() {
  try {
    const yahooURL =
      "https://query1.finance.yahoo.com/v7/finance/quote?symbols=^GSPC,^IXIC,NQ=F";

    const proxyURL =
      "https://api.allorigins.win/raw?url=" + encodeURIComponent(yahooURL);

    const res = await fetch(proxyURL);
    const data = await res.json();

    const r = data.quoteResponse.result;

    const sp = r.find(x => x.symbol === "^GSPC");
    const nq = r.find(x => x.symbol === "^IXIC");
    const nf = r.find(x => x.symbol === "NQ=F");

    const row = (name, obj) => {
      if (!obj) return `<div>${name}: 데이터 없음</div>`;

      const color = obj.regularMarketChange >= 0 ? "#e53935" : "#2979ff";

      return `
        <div style="margin-bottom:4px;">
          ${name}:
          <span style="color:${color}; font-weight:700;">
            ${obj.regularMarketPrice.toFixed(2)}
            (${obj.regularMarketChange.toFixed(2)}, ${obj.regularMarketChangePercent.toFixed(2)}%)
          </span>
        </div>
      `;
    };

    indexBar.innerHTML =
      row("S&P500", sp) +
      row("나스닥", nq) +
      row("나스닥 선물", nf);

  } catch (e) {
    indexBar.innerHTML = "지수 불러오기 실패";
  }
}

fetchIndices();
setInterval(fetchIndices, 10000);
</script>

</body>
</html>
