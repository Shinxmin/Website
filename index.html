<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimal Mobile UI</title>

<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    margin: 0;
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #222;
  }

  /* 전체 컨테이너 (아이폰 비율 고려) */
  .container {
    max-width: 420px;
    margin: 0 auto;
    padding: 16px;
  }

  /* 상단 영역 */
  .header {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  /* 카드 공통 */
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.04);
  }

  /* 프로필 */
  .profile {
    display: flex;
    align-items: center;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #e9edf1;
    margin-right: 12px;
  }

  .name {
    font-weight: 600;
    font-size: 15px;
  }

  .sub {
    font-size: 12px;
    color: #888;
  }

  /* 게시물 내용 */
  .content {
    margin-top: 14px;
    font-size: 15px;
    line-height: 1.6;
    color: #333;
  }

  /* 버튼 영역 */
  .actions {
    display: flex;
    margin-top: 16px;
  }

  .btn {
    flex: 1;
    padding: 12px 0;
    text-align: center;
    border-radius: 12px;
    background: #f4f6f8;
    margin-right: 8px;
    font-size: 14px;
    color: #555;
  }

  .btn:last-child {
    margin-right: 0;
  }

  /* 작은 카드 리스트 */
  .mini-card {
    padding: 14px;
    border-radius: 16px;
    background: #f7f8fa;
    margin-bottom: 10px;
    font-size: 14px;
  }

</style>
</head>

<body>

<div class="container">

  <div class="header">홈</div>

  <!-- 메인 게시물 -->
  <div class="card">
    <div class="profile">
      <div class="avatar"></div>
      <div>
        <div class="name">홍길동</div>
        <div class="sub">방금 전</div>
      </div>
    </div>

    <div class="content">
      오늘은 집중이 잘 되는 하루다. 조용한 공간에서 정리하는 시간이 꽤 중요하다는 걸 다시 느꼈다.
    </div>

    <div class="actions">
      <div class="btn">좋아요</div>
      <div class="btn">댓글</div>
      <div class="btn">공유</div>
    </div>
  </div>

  <!-- 보조 정보 카드 -->
  <div class="card">
    <div class="mini-card">📌 오늘의 기록 3개 완료</div>
    <div class="mini-card">📊 이번 주 집중도 82%</div>
    <div class="mini-card">🕒 평균 작업 시간 4시간</div>
  </div>

</div>

</body>
</html>
