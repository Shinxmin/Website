<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Record</title>

<style>
  body {
    margin: 0;
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .container {
    max-width: 420px;
    margin: 0 auto;
    padding: 16px;
  }

  .header {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .record-btn {
    padding: 14px;
    background: #2979ff;
    color: #fff;
    border-radius: 14px;
    text-align: center;
    margin-bottom: 16px;
    cursor: pointer;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 18px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.04);
    margin-bottom: 14px;
  }

  .profile {
    display: flex;
    align-items: center;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 700;
    margin-right: 12px;
  }

  .date {
    font-size: 12px;
    color: #999;
  }

  .profit {
    margin-top: 14px;
    font-size: 20px;
    font-weight: 700;
  }

  .memo {
    margin-top: 8px;
    font-size: 14px;
    color: #555;
  }

  .modal {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff;
    padding: 20px;
    border-radius: 20px 20px 0 0;
    display: none;
  }

  input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: 1px solid #eee;
  }

  .submit {
    padding: 12px;
    background: #2979ff;
    color: white;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
  }

</style>
</head>

<body>

<div class="container">

  <!-- 상단 제목 -->
  <div class="header">홈</div>

  <!-- 기록 버튼 -->
  <div class="record-btn" onclick="openModal()">+ 기록 추가</div>

  <!-- 게시물 리스트 -->
  <div id="postList"></div>

</div>

<!-- 입력 모달 -->
<div class="modal" id="modal">

  <!-- 티커 -->
  <input id="ticker" placeholder="티커 (예: QLD)">

  <!-- 매수 -->
  <input id="buy" type="number" placeholder="매수 금액">

  <!-- 매도 -->
  <input id="sell" type="number" placeholder="매도 금액">

  <!-- 메모 -->
  <input id="memo" placeholder="메모">

  <div class="submit" onclick="addPost()">저장</div>

</div>

<script>
  const modal = document.getElementById("modal");
  const postList = document.getElementById("postList");

  /* 저장된 데이터 불러오기 */
  let posts = JSON.parse(localStorage.getItem("posts")) || [];

  function openModal() {
    modal.style.display = "block";
  }

  function savePosts() {
    localStorage.setItem("posts", JSON.stringify(posts));
  }

  function renderPosts() {
    postList.innerHTML = "";

    posts.forEach(p => {
      const card = document.createElement("div");
      card.className = "card";

      const color = p.profit >= 0 ? "#e53935" : "#2979ff";

      card.innerHTML = `
        <div class="profile">
          <div class="avatar" style="background:#2979ff;">${p.ticker}</div>
          <div>
            <div><b>${p.ticker} 매매 기록</b></div>
            <div class="date">${p.date}</div>
          </div>
        </div>

        <div class="profit" style="color:${color}">
          ${p.profit >= 0 ? "+" : ""}$${p.profit.toFixed(2)} (${p.percent.toFixed(1)}%)
        </div>

        <div class="memo">${p.memo}</div>
      `;

      postList.appendChild(card);
    });
  }

  function addPost() {
    const ticker = document.getElementById("ticker").value;
    const buy = parseFloat(document.getElementById("buy").value);
    const sell = parseFloat(document.getElementById("sell").value);
    const memo = document.getElementById("memo").value;

    if (!ticker || !buy || !sell) return;

    const profit = sell - buy;
    const percent = (profit / buy) * 100;

    const newPost = {
      ticker,
      profit,
      percent,
      memo,
      date: new Date().toISOString().slice(0,10)
    };

    posts.unshift(newPost);

    savePosts();
    renderPosts();

    modal.style.display = "none";
    document.querySelectorAll("input").forEach(i => i.value = "");
  }

  /* 페이지 로드시 자동 렌더링 */
  renderPosts();
</script>

</body>
</html>
